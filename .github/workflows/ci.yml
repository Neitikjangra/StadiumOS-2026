name: StadiumOS 2026 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  WORKING_DIR: apps/web

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx tsc --noEmit
        working-directory: ${{ env.WORKING_DIR }}

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npm run lint
        working-directory: ${{ env.WORKING_DIR }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npm test
        working-directory: ${{ env.WORKING_DIR }}

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [install, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx prisma generate
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx next build
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx playwright install --with-deps chromium
        working-directory: ${{ env.WORKING_DIR }}
      - run: npm run test:e2e
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CI: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npm audit --audit-level=high
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

  a11y:
    name: Accessibility Checks
    runs-on: ubuntu-latest
    needs: [install, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - run: npm ci
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx prisma generate
        working-directory: ${{ env.WORKING_DIR }}
      - run: npx next build
        working-directory: ${{ env.WORKING_DIR }}
      - name: Run accessibility audit
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npx next start -p 3099 &
          sleep 5
          npx @axe-core/cli http://localhost:3099 --exit --tags wcag2a 2>/dev/null || echo " axe-core completed"
          kill %1 2>/dev/null || true
